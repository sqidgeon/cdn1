# ─────────────────────────────────────────────────────────────────────────────
#  ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ  ·  language/en.yml
#  Edit freely and run /fpp reload to apply changes without restarting.
#
#  Colour format: MiniMessage tags
#    Named    : <red>, <gray>, <white>, <dark_gray>, <yellow> …
#    Hex      : <#0079FF>text</#0079FF>
#    Style    : <bold>, <italic>, <underlined>, <strikethrough>
#    Reset    : <reset>
#  Placeholders: {placeholder} — see each section for available ones
#
#  ⚠  Keys marked "INTERNAL" are used by the layout engine.
#     You may adjust colours/characters but keep the key names intact.
# ─────────────────────────────────────────────────────────────────────────────

# ── Plugin prefix — prepended to all [FPP] messages ──────────────────────────
#  Feel free to change the colour/text, but keep it short.
prefix: "<dark_gray>[<#0079FF>ꜰᴘᴘ</#0079FF><dark_gray>]<reset> "


# ═════════════════════════════════════════════════════════════════════════════
#  1 · INTERNAL LAYOUT  —  do not remove or rename these keys
#  You may adjust colours/characters but keep the structure intact.
# ═════════════════════════════════════════════════════════════════════════════

# Horizontal rule used in headers and footers
divider: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Help menu  (placeholders {cmd}, {args}, {desc} required)
help-header: "<dark_gray><st>━━━━━━━━━</st> <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray><st>━━━━━━━━━</st>"
help-entry:  "  <#0079FF>/{cmd}</#0079FF><gray> {args} <dark_gray>— <white>{desc}"
help-footer: "<dark_gray><st>━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</st>"

# Plugin info screen (/fpp bare) — header line
info-screen-header: "  <#0079FF><bold>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ ᴘʟᴜɢɪɴ</#0079FF> <dark_gray>· <gray>ꜰᴘᴘ"


# ═════════════════════════════════════════════════════════════════════════════
#  2 · GENERIC ERRORS
# ═════════════════════════════════════════════════════════════════════════════

# {0} — the root command name (e.g. "fpp")
no-permission:  "{prefix}<red>ʏᴏᴜ ᴅᴏɴ'ᴛ ʜᴀᴠᴇ ᴘᴇʀᴍɪꜱꜱɪᴏɴ ᴛᴏ ᴅᴏ ᴛʜɪꜱ."
unknown-command: "{prefix}<red>ᴜɴᴋɴᴏᴡɴ ꜱᴜʙ-ᴄᴏᴍᴍᴀɴᴅ. <gray>ᴛʀʏ <#0079FF>/{0} ʜᴇʟᴘ</#0079FF><gray> ꜰᴏʀ ᴀ ʟɪꜱᴛ."
player-only:    "{prefix}<red>ᴏɴʟʏ ᴀ ᴘʟᴀʏᴇʀ ᴄᴀɴ ʀᴜɴ ᴛʜɪꜱ ᴄᴏᴍᴍᴀɴᴅ."
invalid-number: "{prefix}<red>ɪɴᴠᴀʟɪᴅ ɴᴜᴍʙᴇʀ. ᴘʟᴇᴀꜱᴇ ᴇɴᴛᴇʀ ᴀ ᴘᴏꜱɪᴛɪᴠᴇ ɪɴᴛᴇɢᴇʀ."


# ═════════════════════════════════════════════════════════════════════════════
#  3 · SPAWNING
# ═════════════════════════════════════════════════════════════════════════════

# ── Spawn results ──────────────────────────────────────────────────────────────
# {count} — bots spawned  |  {total} — total active  |  {name} — bot name
# {max}   — global cap    |  {limit} — personal limit
spawn-success:            "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ꜱᴜᴍᴍᴏɴᴇᴅ<gray>. <dark_gray>(<#0079FF>{total}</#0079FF> <gray>ᴀᴄᴛɪᴠᴇ<dark_gray>)"
spawn-max-reached:        "{prefix}<red>ᴍᴀx ʙᴏᴛ ʟɪᴍɪᴛ ʀᴇᴀᴄʜᴇᴅ <dark_gray>(<#0079FF>{max}</#0079FF> <gray>ʙᴏᴛꜱ<dark_gray>)<red>. ᴅᴇʟᴇᴛᴇ ꜱᴏᴍᴇ ꜰɪʀꜱᴛ."
spawn-user-limit-reached: "{prefix}<red>ʏᴏᴜ'ᴠᴇ ʀᴇᴀᴄʜᴇᴅ ʏᴏᴜʀ ᴘᴇʀꜱᴏɴᴀʟ ʙᴏᴛ ʟɪᴍɪᴛ <dark_gray>(<#0079FF>{limit}</#0079FF> <gray>ʙᴏᴛ(ꜱ)<dark_gray>)<red>."
spawn-invalid:            "{prefix}<red>ɪɴᴠᴀʟɪᴅ ᴜꜱᴀɢᴇ. <gray>ᴛʀʏ <#0079FF>/fpp spawn [afk] [amount] [--name <name>] [--random-name] [--notp]</#0079FF><gray>."
spawn-invalid-name:       "{prefix}<red>ɪɴᴠᴀʟɪᴅ ʙᴏᴛ ɴᴀᴍᴇ. <gray>ᴜꜱᴇ <white>1–16 <gray>ᴄʜᴀʀꜱ <dark_gray>(<white>ʟᴇᴛᴛᴇʀꜱ<gray>, <white>ᴅɪɡɪᴛꜱ<gray>, <white>_<dark_gray>)<gray>."
spawn-badword-rejected:   "{prefix}<red>ʙᴏᴛ ɴᴀᴍᴇ '<white>{name}<red>' ɪꜱ ɴᴏᴛ ᴀʟʟᴏᴡᴇᴅ <dark_gray>(<gray>ᴄᴏɴᴛᴀɪɴꜱ ʙᴀᴅᴡᴏʀᴅ: <white>{badword}<dark_gray>)<red>."
spawn-badword-auto-prefixed: "{prefix}<yellow>⚠ <gray>ɴᴀᴍᴇ '<red>{original}<gray>' ᴄᴏɴᴛᴀɪɴᴇᴅ ᴀ ʙᴀᴅᴡᴏʀᴅ — ʀᴇɴᴀᴍᴇᴅ ᴛᴏ '<#0079FF>{name}</#0079FF><gray>'."
badword-filter-empty-warning: "{prefix}<yellow>⚠ <gray>ʙᴀᴅᴡᴏʀᴅ ꜰɪʟᴛᴇʀ ɪꜱ <white>ᴇɴᴀʙʟᴇᴅ <gray>ʙᴜᴛ <red>ɴᴏ ꜱᴏᴜʀᴄᴇꜱ ᴀʀᴇ ᴀᴄᴛɪᴠᴇ<gray>. <dark_gray>ᴇɴᴀʙʟᴇ <white>badword-filter.use-global-list <dark_gray>ᴏʀ ᴀᴅᴅ ᴡᴏʀᴅꜱ ᴛᴏ <white>badword-filter.words <dark_gray>/ <white>bad-words.yml<dark_gray>, ᴛʜᴇɴ ʀᴜɴ <white>/fpp reload<dark_gray>."
spawn-name-taken:         "{prefix}<red>ᴀ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name} <red>ɪꜱ ᴀʟʀᴇᴀᴅʏ ᴀᴄᴛɪᴠᴇ."
spawn-name-taken-player:  "{prefix}<red>ᴀ ʀᴇᴀʟ ᴘʟᴀʏᴇʀ ɴᴀᴍᴇᴅ <white>{name} <red>ɪꜱ ᴀʟʀᴇᴀᴅʏ ᴏɴʟɪɴᴇ."
spawn-name-taken-nick:    "{prefix}<red>ᴀ ᴘʟᴀʏᴇʀ ɪꜱ ᴄᴜʀʀᴇɴᴛʟʏ ɴɪᴄᴋᴇᴅ ᴀꜱ <white>{name}<red>. <gray>ᴄʜᴏᴏꜱᴇ ᴀ ᴅɪꜰꜰᴇʀᴇɴᴛ ʙᴏᴛ ɴᴀᴍᴇ."
spawn-relog-not-found:    "{prefix}<red>ɴᴏ ꜱᴀᴠᴇᴅ ʙᴏᴛ ᴡᴀꜱ ꜰᴏᴜɴᴅ ɴᴀᴍᴇᴅ <white>{name}<red>."
spawn-relog-world-missing: "{prefix}<red>ᴄᴀɴ'ᴛ ʀᴇʟᴏɢ <white>{name}<red> — ᴘʀᴇᴠɪᴏᴜꜱ ᴡᴏʀʟᴅ <white>{world}<red> ɪꜱ ɴᴏᴛ ʟᴏᴀᴅᴇᴅ."
spawn-no-names-left:      "{prefix}<red>ᴀʟʟ ɴᴀᴍᴇꜱ ɪɴ ᴛʜᴇ ᴘᴏᴏʟ ᴀʀᴇ ɪɴ ᴜꜱᴇ. <gray>ʀᴇᴅᴜᴄᴇ ᴀᴄᴛɪᴠᴇ ʙᴏᴛꜱ ᴏʀ ᴀᴅᴅ ᴍᴏʀᴇ ɴᴀᴍᴇꜱ."

# ── Console / location errors ──────────────────────────────────────────────────
# {world} — the world name that was not found
spawn-console-no-world:   "{prefix}<red>ɴᴏ ᴡᴏʀʟᴅ ɪꜱ ʟᴏᴀᴅᴇᴅ — ᴄᴀɴɴᴏᴛ ᴅᴇᴛᴇʀᴍɪɴᴇ ᴀ ꜱᴘᴀᴡɴ ʟᴏᴄᴀᴛɪᴏɴ."
spawn-world-not-found:    "{prefix}<red>ᴡᴏʀʟᴅ '<white>{world}<red>' ᴅᴏᴇꜱ ɴᴏᴛ ᴇxɪꜱᴛ ᴏʀ ɪꜱ ɴᴏᴛ ʟᴏᴀᴅᴇᴅ."
spawn-invalid-coords:     "{prefix}<red>ɪɴᴠᴀʟɪᴅ ᴄᴏᴏʀᴅɪɴᴀᴛᴇꜱ. <gray>ᴜꜱᴇ ꜰᴏʀᴍᴀᴛ: <white>x,y,z <gray><dark_gray>(ᴇ.ɢ. <white>100,64,200<gray>)"

player-not-found:   "{prefix}<red>ᴘʟᴀʏᴇʀ <white>{player} <red>ɪꜱ ɴᴏᴛ ᴏɴʟɪɴᴇ."

# ── Spawn cooldown ─────────────────────────────────────────────────────────────
# {seconds} — seconds remaining
spawn-cooldown: "{prefix}<red>ᴘʟᴇᴀꜱᴇ ᴡᴀɪᴛ <white>{seconds}s<red> ʙᴇꜰᴏʀᴇ ꜱᴘᴀᴡɴɪɴɢ ᴀɡᴀɪɴ."


# ═════════════════════════════════════════════════════════════════════════════
#  4 · DELETE
# ═════════════════════════════════════════════════════════════════════════════

# {name}  — bot name  |  {count} — bots deleted
delete-success:        "{prefix}<#0079FF>{name}</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-all:            "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
delete-none:           "{prefix}<red>ɴᴏ ʙᴏᴛꜱ ᴀʀᴇ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ."
# Shown when a bulk despawn is attempted while bot persistence restore is still running
delete-restore-in-progress: "{prefix}<red>ʙᴏᴛ ʀᴇꜱᴛᴏʀᴀᴛɪᴏɴ ɪꜱ ɪɴ ᴘʀᴏɢʀᴇꜱꜱ — ᴘʟᴇᴀꜱᴇ ᴡᴀɪᴛ ᴀ ꜰᴇᴡ ꜱᴇᴄᴏɴᴅꜱ ᴀɴᴅ ᴛʀʏ ᴀɡᴀɪɴ."
delete-not-found:      "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red> ᴡᴀꜱ ꜰᴏᴜɴᴅ."
# {count} — number of bots randomly despawned
delete-random-success: "{prefix}<#0079FF>{count}</#0079FF> <gray>ʀᴀɴᴅᴏᴍ ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
# {count} — number of bots despawned in order (oldest first)
delete-num-success:    "{prefix}<#0079FF>{count}</#0079FF> <gray>ꜰᴀᴋᴇ ᴘʟᴀʏᴇʀ(ꜱ) <white>ᴅɪꜱᴄᴏɴɴᴇᴄᴛᴇᴅ<gray>."
despawn-num-usage:     "{prefix}<red>ᴜꜱᴀɢᴇ: <white>/fpp despawn --num <num></white>."


# ═════════════════════════════════════════════════════════════════════════════
#  5 · LIST
# ═════════════════════════════════════════════════════════════════════════════

list-none: "  <gray>ɴᴏ ʙᴏᴛꜱ ᴀʀᴇ ᴄᴜʀʀᴇɴᴛʟʏ ᴀᴄᴛɪᴠᴇ."


# ═════════════════════════════════════════════════════════════════════════════
#  6 · BOT BROADCASTS
# ═════════════════════════════════════════════════════════════════════════════

# {name} — bot display name. Plain names are yellow by default; wrap in tags to override, e.g. <red>{name}</red>
bot-join:  "<yellow>{name} joined the game</yellow>"
bot-leave: "<yellow>{name} left the game</yellow>"

# {old} — previous bot name · {new} — new bot name
bot-rename: "{prefix}<#0079FF>{old}</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ ʀᴇɴᴀᴍᴇᴅ ᴛᴏ <#0079FF>{new}</#0079FF><gray>."
rename-invalid-name: "{prefix}<red>ɪɴᴠᴀʟɪᴅ ʙᴏᴛ ɴᴀᴍᴇ. <gray>ᴜꜱᴇ <white>1–16 <gray>ᴄʜᴀʀꜱ <dark_gray>(<white>ʟᴇᴛᴛᴇʀꜱ<gray>, <white>ᴅɪɡɪᴛꜱ<gray>, <white>_<dark_gray>)<gray>."
rename-same-name: "{prefix}<yellow>⚠ <gray>ᴛʜᴇ ɴᴇᴡ ɴᴀᴍᴇ ɪꜱ ᴛʜᴇ ꜱᴀᴍᴇ ᴀꜱ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ɴᴀᴍᴇ."
rename-name-taken: "{prefix}<red>ᴀ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red> ɪꜱ ᴀʟʀᴇᴀᴅʏ ᴀᴄᴛɪᴠᴇ."
rename-name-taken-player: "{prefix}<red>ᴀ ʀᴇᴀʟ ᴘʟᴀʏᴇʀ ɴᴀᴍᴇᴅ <white>{name}<red> ɪꜱ ᴄᴜʀʀᴇɴᴛʟʏ ᴏɴʟɪɴᴇ."
rename-badword-rejected: "{prefix}<red>ʙᴏᴛ ɴᴀᴍᴇ '<white>{name}<red>' ɪꜱ ɴᴏᴛ ᴀʟʟᴏᴡᴇᴅ <dark_gray>(<gray>ᴄᴏɴᴛᴀɪɴꜱ ʙᴀᴅᴡᴏʀᴅ: <white>{badword}<dark_gray>)<red>."
rename-badword-auto-renamed: "{prefix}<yellow>⚠ <gray>ɴᴀᴍᴇ '<red>{original}<gray>' ᴄᴏɴᴛᴀɪɴᴇᴅ ᴀ ʙᴀᴅᴡᴏʀᴅ — ʀᴇɴᴀᴍɪɴɢ ᴛᴏ '<#0079FF>{name}</#0079FF><gray>' ɪɴꜱᴛᴇᴀᴅ."
rename-starting: "{prefix}<gray>ʀᴇɴᴀᴍɪɴɢ <#0079FF>{old}</#0079FF> <gray>→ <#0079FF>{new}</#0079FF><gray>…"
rename-failed-no-location: "{prefix}<red>✘ <gray>ᴄᴀɴɴᴏᴛ ʀᴇꜱᴘᴀᴡɴ <#0079FF>{name}</#0079FF><gray> — ɴᴏ ʟᴏᴄᴀᴛɪᴏɴ ɪꜱ ʀᴇᴄᴏʀᴅᴇᴅ ꜰᴏʀ ᴛʜɪꜱ ʙᴏᴛ."
rename-failed-spawn: "{prefix}<red>✘ <gray>ꜰᴀɪʟᴇᴅ ᴛᴏ ʀᴇꜱᴘᴀᴡɴ <#0079FF>{name}</#0079FF><gray>: <white>{reason}</white>."
rename-timeout: "{prefix}<yellow>⚠ <gray>ᴛɪᴍᴇᴅ ᴏᴜᴛ ᴡᴀɪᴛɪɴɢ ꜰᴏʀ <#0079FF>{name}</#0079FF><gray> ᴛᴏ ꜰɪɴɪꜱʜ ꜱᴘᴀᴡɴɪɴɢ. ʙᴏᴛ ɪꜱ ᴏɴʟɪɴᴇ ʙᴜᴛ ᴅᴀᴛᴀ ᴍᴀʏ ɴᴏᴛ ʙᴇ ꜰᴜʟʟʏ ʀᴇꜱᴛᴏʀᴇᴅ."
rename-success: "{prefix}<green>✔ <#0079FF>{new}</#0079FF> <gray>ɪꜱ ᴏɴʟɪɴᴇ <dark_gray>(<red>{old}</red><gray> ʀᴇɴᴀᴍᴇᴅ — ɪɴᴠᴇɴᴛᴏʀʏ, xᴘ, ᴄʜᴀᴛ, ʟᴘ ɢʀᴏᴜᴘ ʀᴇꜱᴛᴏʀᴇᴅ."
bot-not-found: "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."


# ═════════════════════════════════════════════════════════════════════════════
#  7 · FAKE CHAT
# ═════════════════════════════════════════════════════════════════════════════

# ── Global toggle ──────────────────────────────────────────────────────────────
chat-enabled:    "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
chat-disabled:   "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
chat-status-on:  "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ɪꜱ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
chat-status-off: "{prefix}<#0079FF>ꜰᴀᴋᴇ ᴄʜᴀᴛ</#0079FF> <gray>ɪꜱ <white>ᴅɪꜱᴀʙʟᴇᴅ<gray>."
chat-invalid:    "{prefix}<red>ᴜꜱᴀɢᴇ<gray>: <#0079FF>/fpp chat <on|off|status></#0079FF> <dark_gray>|</dark_gray> <#0079FF>/fpp chat <bot> [on|off|status|info|say <msg>|mute [sec]]</#0079FF><gray>."

# ── Per-bot chat management ─────────────────────────────────────────────────────
# {name}    — bot display name
# {message} — message that was forced-sent
# {seconds} — mute duration  |  {enabled} — enabled state
chat-bot-not-found:    "{prefix}<red>ɴᴏ ᴀᴄᴛɪᴠᴇ ʙᴏᴛ ɴᴀᴍᴇᴅ <white>{name}<red>."
chat-bot-status-on:    "{prefix}<#0079FF>{name}</#0079FF> <gray>ᴄʜᴀᴛ ɪꜱ <white>ᴇɴᴀʙʟᴇᴅ<gray>."
chat-bot-status-off:   "{prefix}<#0079FF>{name}</#0079FF> <gray>ᴄʜᴀᴛ ɪꜱ <white>ꜱɪʟᴇɴᴄᴇᴅ<gray>."
chat-bot-enabled:      "{prefix}<#0079FF>{name}</#0079FF> <gray>ᴡɪʟʟ <white>ɴᴏᴡ ᴄʜᴀᴛ<gray>."
chat-bot-disabled:     "{prefix}<#0079FF>{name}</#0079FF> <gray>ʜᴀꜱ ʙᴇᴇɴ <white>ꜱɪʟᴇɴᴄᴇᴅ<gray>."
